    <script type="application/ld+json">
    {
      "@context": "https://schema.org",

      "mainEntity": [
        {
          "@type": "Question",
          "name": "What is Bespoke Kente?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "At Hinkro Kente, bespoke means your cloth is designed from scratch and woven only for you. Every project begins with understanding the client's vision. We transform personal stories, family heritage, color preferences, symbols, and ideas into authentic handwoven Kente that exists nowhere else. No two bespoke pieces are ever the same."
          }
        },
        {
          "@type": "Question",
          "name": "Can I get Kente made in my exact colors and symbols?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Yes. Hinkro Kente weaves Kente in your exact color combination. If you've struggled to find Kente in the specific colors you want, or if previous weavers couldn't match your vision, Hinkro can help. We work with you through a design consultation to select colors, patterns, Adinkra symbols, initials, dates, and meaningful motifs before weaving begins."
          }
        },
        {
          "@type": "Question",
          "name": "How is Hinkro Kente different from buying Kente off the shelf?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Off-the-shelf Kente comes in standard patterns and colour combinations. Hinkro Kente creates Kente from scratch — designed around your vision, colours, symbols, and story. Every project includes design sketches, colour studies, sample weaving, and approval before production begins, ensuring the final piece is exactly what you envisioned."
          }
        },
        {
          "@type": "Question",
          "name": "What is the price for Kente cloth?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "At Hinkro Kente, the price of Kente cloth varies depending on pattern complexity, materials, and fabric size. Kente can range from around $70 to several thousand dollars per piece, with authentic handwoven Kente costing more than mass-produced versions. Every project receives a transparent quote after consultation."
          }
        },
        {
          "@type": "Question",
          "name": "Do you produce Kente for weddings and engagements?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Yes. Hinkro Kente specializes in wedding and engagement Kente — from bridal cloths to couples' matching sets and family coordinated designs. We integrate prosperity and unity symbols with your chosen color palette to create meaningful wedding Kente that reflects your unique love story."
          }
        },
        {
          "@type": "Question",
          "name": "Where is Hinkro Kente located?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Hinkro Kente is based in Accra, Ghana, specifically in Ablekuma, Olebu, where our weaving studio is located. We also have a presence in Atlanta, Georgia, in the United States, and Leicester in the United Kingdom. We serve clients worldwide."
          }
        },
        {
          "@type": "Question",
          "name": "Do you ship outside Ghana?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Yes! Hinkro Kente ships to any country in the world. We serve clients in the USA, UK, Canada, Europe, Australia, Caribbean, and across Africa. Every piece is carefully packaged and shipped with tracking."
          }
        },
        {
          "@type": "Question",
          "name": "What are the steps in acquiring a Kente from Hinkro?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Customers begin by booking a consultation. During the consultation, we discuss preferred colors, patterns, symbols, and design requirements. We then develop sketches and a colour study. After your approval, we weave a sample strip for your review. Once the sample is approved, full production begins. The entire process from consultation to delivery typically takes 4-10 weeks."
          }
        },
        {
          "@type": "Question",
          "name": "How long does it take to weave a bespoke Kente?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "After consultation and sketch approval, Kente weaving can take 4-10 weeks depending on the complexity of the pattern, number of yards, and design specifications. We advise clients to start the process at least six months before their event to allow ample time for design development and weaving."
          }
        },
        {
          "@type": "Question",
          "name": "What is a Kente Graduation Stole?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "A Kente Graduation Stole is a ceremonial sash worn over a graduation gown to represent achievement, heritage, school pride, and personal identity. Hinkro Kente creates authentic African Kente Graduation Stoles with custom colors, names, programs, crests, and class details."
          }
        },
        {
          "@type": "Question",
          "name": "Can I commission a Kente as a gift or family heirloom?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Absolutely. Many Hinkro clients commission Kente as luxury gifts for weddings, birthdays, milestones, or family heritage pieces. We work with you to incorporate meaningful symbols, colors, and stories that make the gift deeply personal and one of a kind."
          }
        },
        {
          "@type": "Question",
          "name": "What is the difference between machine-made kente and handwoven kente?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Machine-made cloth is mass-produced with printed patterns. Hinkro's Kente is 100% handwoven by skilled Ghanaian artisans using traditional narrow-strip weaving techniques on authentic looms. Every thread is placed by hand, making each piece a work of art."
          }
        }
      ]
    }
